front:
  text: 二經同卷薑六
  hash: sha256:afcdac23fe8ffc18724d886cfd70895bbc9ea9ce6bbf563a377580a2f2ffee7e
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5a0297_HFL_000-001a, image: hfl/0136/0136-004.png}
body:
  text: 黄帝授三子玄女經太上登眞三矯靈應經黄帝授三子玄女經天一所在甲戊庚且大吉夕小吉乙巳晝神后夜傳送丙丁且登明暮從魁六辛晝勝先夜功曹壬癸晝太一夜太衝占與人期會天罡臨日辰者會在日辰前為巳過在日辰後為未至又神在門會行人未主人近行在外巳至主人遠行在內未至罡加孟神在内加仲在門加季在外天罡大吉加午未者喚人必來非此者凶時上見王相必來相剋無氣來求物天罡加孟不得臨仲得半加季盡得占行人至時甲乙行丙丁至不至還以甲乙日至他例此諸欲娶婦嫁女必記初許嫁之日以為本其娶婦時慎無令尅其許嫁日辰也剋日害舅剋辰害姑姑與舅是夫之父母也盡剋日辰爲不利一家假令申子日許嫁庚辛日納財皆爲剋日戊巳納之爲尅辰也假令辛未日納皆為剋日辰戊申巳酉日亦然也又欲令日辰隂陽中及用傳中有天后無螣蛇白獸相尅吉謂内婦時如此者即吉又無令夫家之門傷婦年即婦有咎假今二月乙未日巳時天罡加巳婦年立辰從魁加之夫家門在子地太一加之夫家門在丑勝先加之此並爲夫家門傷婦年也謂夫家門上火神尅妻家門上金神也若夫門立酉功曹加酉婦在東方卯來氐西酉入功曹即婦有咎他倣此又無令婦年上神傷夫家之門即夫家有咎也假令婦年立辰從魁加之夫門在酉功曹臨之夫門在戌太衝臨之此爲婦年上神傷夫家之門即夫家有咎門者所出之辰凡娶婦為入頑嫁女爲出頑從方入圓為入頑從方岀圓爲出頑也又不欲所出入之神傷日辰為女固有敗傷又不欲令傷日爲害翁謂神將共傷日也假令一月庚子日魁罡加丑之時也太一臨庚上其將得朱雀謂小吉爲天一臨戌上即太一為前二加庚也此為神將并傷日傷日害舅若日并傷神將為害矣假令二月癸丑日巳時勝先加癸將得螣蛇此爲日并傷神将害夫又辰中有微氣徃助之者爲夫死假令二月甲戌日辰時而傳送加甲甲木也傳送金也金傷木又戍中之金復徃助之者爲夫死傷辰爲婦謂神將共傷辰也假今二月庚中日魁加丑丑時也太一臨申将得朱雀此爲神時并傷辰也假令二月壬子日魁加辰勝先臨子爲用將得螣蛇此爲日辰并傷神將也但辰傷婦謂辰傷其陽神神將者又曰内有微氣徃助之者爲婦死也假令二月丁巳日魁加卯神后加巳巳火也神后水也水傷火又丁巳丁是壬妻故也復徃助之爲婦死以其上將爲所坐形狀假今二月甲戌日魁加辰傅送爲青龍而加甲為夫婦死死坐送行酒食故也黃帝授三子玄女經
